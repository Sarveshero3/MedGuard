# ============================================================
# MedGuard — CI Pipeline
# Runs on push to main and PRs targeting main
# Jobs: lint/test ms1, lint ms2, lint frontend, docker build
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── ms1-core-api: Lint + Test ──────────────────────────────
  lint-test-ms1:
    name: ms1 — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms1-core-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ms1-core-api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  # ── ms2-agent-service: Lint ────────────────────────────────
  lint-ms2:
    name: ms2 — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms2-agent-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: flake8 app/ --max-line-length=120 --exclude=__pycache__

  # ── Frontend: Lint ─────────────────────────────────────────
  lint-frontend:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ── Docker Build Validation ────────────────────────────────
  docker-build:
    name: Docker — Build All
    runs-on: ubuntu-latest
    needs: [lint-test-ms1, lint-ms2, lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
