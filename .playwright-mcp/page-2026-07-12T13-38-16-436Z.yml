          - generic [ref=e60]: For caregivers
          - heading "Visibility from a distance" [level=3] [ref=e61]
          - paragraph [ref=e62]: An adult child living elsewhere has no reliable way to know whether a parent's new prescription conflicts with an existing one. MedGuard gives linked caregivers visibility into flagged risks — without depending on memory alone.
