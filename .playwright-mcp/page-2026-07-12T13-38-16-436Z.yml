          - heading "Managing multiple prescribers" [level=3] [ref=e57]
          - paragraph [ref=e58]: Each doctor prescribes with confidence in their own medicine but no visibility into what the others have already prescribed. MedGuard brings the full picture together so you can ask better questions at every visit.
