# ─────────────────────────────────────────────────────────────
# MedGuard — NGINX Reverse Proxy Configuration
# Routes: / → frontend, /api → ms1-core-api
# ms2 is internal-only (not exposed through NGINX)
# ─────────────────────────────────────────────────────────────

upstream frontend {
    server frontend:3000;
}

upstream ms1_api {
    server ms1-core-api:4000;
}

server {
    listen 80;
    server_name localhost;

    # ── Security headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';" always;
    # HTTPS redirection / Strict-Transport-Security configuration:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Upload size limit (8MB per PRD) ───────────────────────
    client_max_body_size 8m;

    # ── API routes → ms1 ─────────────────────────────────────
    location /api/ {
        proxy_pass http://ms1_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Frontend (React SPA) ─────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
